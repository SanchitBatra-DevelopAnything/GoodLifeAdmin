<div class="row">
    <div class="col">
        <div class="container">
            <h3 style="display:inline; font-size:48px;" class="pangolin">New Requests!</h3> 
            <p>
                All these members want to join our network! Please approve to 
                <span style="color:green; font-weight: bold;">Allow</span> 
                them or 
                <span style="color:red; font-weight: bold;">Reject</span>
            </p>
            <hr>
        </div>
    </div>
</div>

<div class="loader center" *ngIf="isLoading"></div>

<div class="container" *ngIf="!isLoading">

    <p *ngIf="notificationData.length == 0" 
       style="color: red; font-size: 20px;" 
       class="pangolin">
       No Pending Requests!
    </p>

    <div class="row">
        <div class="col-xs-3" 
             *ngFor="let data of notificationData; let i=index;" 
             style="margin-bottom: 15px;">

            <div class="card flex justify-content-center">

                <p-card header="NAME : {{data.distributorName}}">

                    <!-- IMAGE -->
                    <div style="text-align:center; margin-bottom:10px;">
                        <img 
                            [src]="data.imgUrl" 
                            alt="Distributor Image"
                            style="width:100%; height:150px; object-fit:cover; border-radius:8px;"
                            onerror="this.src='assets/default-user.png'"
                        />
                    </div>

                    <p style="font-weight: bold; color: red; font-size:15px;">
                        From : {{data.area}}
                    </p>

                    <p style="font-weight: bold; color: red; font-size:15px;">
                        Ph No. : {{data.contact}}
                    </p>

                    <!-- ACTION BUTTONS -->
    <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:15px;">
        <button 
            class="btn btn-success btn-sm"
            (click)="onApprove(i)">
            Approve
        </button>

        <button 
            class="btn btn-danger btn-sm"
            (click)="onReject(i)">
            Reject
        </button>
    </div>

                </p-card>

            </div>
        </div>
    </div>   

</div>
