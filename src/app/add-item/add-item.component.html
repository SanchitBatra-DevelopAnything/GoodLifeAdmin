<!-- app.component.html -->
<div class="container" *ngIf = "!isLoading">
    <h1>Add spare parts here!</h1>
    <h5>for : {{parentCategoryData.categoryName}}</h5>
  
    <form [formGroup]="addItemForm" (ngSubmit) = "onSubmit(addItemForm.value)">
     
   <div class="form-group">
    <label for="photo">Photo Upload</label>
    <div class="file-input-container">
      <input type="file" id="photo" class="file-input" (change)="onFileChange($event)" accept="image/*">
      <label class="file-input-label button-blue" for="photo" style = "font-size: 15px;">Choose a file</label>
    </div>
    <div class="photo-preview" *ngIf="photoPreview">
      <img [src]="photoPreview" alt="Photo Preview">
    </div>
  </div>
      <div class="form-group">
        <label for="name">SPARE PART NAME</label>
        <input type="text" id="name" formControlName="itemName" class = "form-control">
      </div>
      
      <!-- <div>
          <p style = "text-align: center; font-size: 12px; font-weight: bold; color: red;">Please include GST as applicable in the prices!</p>
      </div> -->
      <div class="form-group">
        <label for="price">PRICE</label>
        <input type="number" id="price" formControlName="price" class = "form-control">
      </div>

      <div class="form-group d-flex align-items-center justify-content-between mt-3">
        <label for="isCustomizableToggle" class="mb-0">Customizable?</label>
        <label class="switch">
          <input
            type="checkbox"
            id="isCustomizableToggle"
            formControlName="isCustomizable"
          />
          <span class="slider round"></span>
        </label>
      </div>

      <div class="form-group">
        <label for="rating">SPECS (if any)</label>
        <textarea rows="5" cols="60" name="text" placeholder="Enter Details for this item" formControlName = "details" class = "form-control"></textarea>
      </div>
  
      <button type="submit" class = "btn choc-button">Submit</button>
    </form>
  </div>

  <div class="loader center" *ngIf = "isLoading"></div>
